<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMPACTING 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
  <script src="three.min.js"></script>
</head>
<body>
  <div id="game-container">
    <div id="three-canvas"></div>
    <!-- HUD Overlay -->
    <div id="hud" class="hidden">
      <div id="hud-left">
        <div id="hud-hp"></div>
        <div id="hud-dash"></div>
        <div id="hud-compact"></div>
      </div>
      <div id="hud-right">
        <div id="hud-level"></div>
        <div id="hud-wave"></div>
      </div>
      <div id="hud-boss" class="hidden">
        <div id="hud-boss-name"></div>
        <div id="hud-boss-bar"></div>
      </div>
      <div id="hud-weapon-name"></div>
      <div id="hud-weapon-info">
        <div id="hud-weapon-hint"></div>
        <div id="hud-weapon-charge"></div>
      </div>
      <div id="hud-wave-announce" class="hidden"></div>
    </div>
    <!-- Full-screen overlays -->
    <div id="overlay-title" class="overlay">
      <div id="title-content"></div>
    </div>
    <div id="overlay-cutscene" class="overlay hidden"></div>
    <div id="overlay-death" class="overlay hidden"></div>
    <div id="overlay-compact" class="overlay hidden"></div>
    <div id="overlay-choice" class="overlay hidden"></div>
    <div id="overlay-flash"></div>
    <!-- Memory card UI -->
    <div id="memory-ui"></div>
  </div>
  <script src="js/renderer.js?v=2"></script>
  <script src="js/models.js?v=2"></script>
  <script src="js/engine3d.js?v=2"></script>
  <script src="js/entities3d.js?v=2"></script>
  <script src="js/world3d.js?v=2"></script>
  <script src="js/story3d.js?v=2"></script>
  <script src="js/game3d.js?v=2"></script>
</body>
</html>
